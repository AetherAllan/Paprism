name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Android APK on EAS
        id: build
        run: |
          set -euo pipefail
          eas build -p android --profile production --non-interactive --wait --json > /tmp/eas-build.json
          URL=$(node -e "const b=require('/tmp/eas-build.json'); const x=Array.isArray(b)?b[0]:b; if(!x?.artifacts?.buildUrl) process.exit(1); process.stdout.write(x.artifacts.buildUrl)")
          echo "apk_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Download APK
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          curl -fsSL -o "ArxivTok-${TAG}.apk" "${{ steps.build.outputs.apk_url }}"
          ls -lh "ArxivTok-${TAG}.apk"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ArxivTok-${{ github.ref_name }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
